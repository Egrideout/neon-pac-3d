<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050713" />
    <link rel="icon" href="data:," />
    <title>Neon Pac 3D</title>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>
      <div class="vignette"></div>
      <header class="hud">
        <div class="brand"><span class="brand-dot"></span>NEON PAC <b>3D</b></div>
        <div class="stats">
          <div><span>SCORE</span><strong id="score">000000</strong></div>
          <div><span>HIGH</span><strong id="high-score">000000</strong></div>
          <div><span>SECTOR</span><strong id="level">01</strong></div>
          <div><span>LIVES</span><strong id="lives">● ● ●</strong></div>
        </div>
      </header>
      <div class="power-wrap" id="power-wrap">
        <div class="power-label"><span>BLASTER CHARGE</span><b id="power-seconds">10.0s</b></div>
        <div class="power-track"><i id="power-bar"></i></div>
      </div>
      <div class="message" id="message"></div>
      <div class="toast" id="toast">ENERGY CORE ONLINE — SPACE TO FIRE</div>
      <footer class="controls">
        <span><kbd>WASD</kbd> or <kbd>ARROWS</kbd> move</span>
        <span><kbd>SPACE</kbd> fire when charged</span>
        <span><kbd>P</kbd> pause</span>
      </footer>
      <button class="sound" id="sound" aria-label="Toggle sound">♪</button>
      <div class="start-screen" id="start-screen">
        <div class="start-card">
          <p class="eyebrow">A NEW SPIN ON THE CLASSIC</p>
          <h1>NEON<br><em>PAC</em> 3D</h1>
          <p class="intro">Clear the maze. Eat an energy core. Then turn the hunt around.</p>
          <button id="start-button"><span>PLAY NOW</span><i>→</i></button>
          <p class="hint">Best with keyboard · Sound on</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
